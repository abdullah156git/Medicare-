<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicare+ | Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --primary: #38bdf8; --border: #334155; --input-bg: #0f172a;}
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .login-box { background: var(--card-bg); padding: 50px; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center;}
        .login-box h1 { margin-top: 0; font-size: 28px; color: var(--primary); margin-bottom: 10px;}
        .login-box p { color: var(--text-muted); margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; text-align: left;}
        label { display: block; font-weight: 500; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 15px; background: var(--input-bg); color: var(--text-main); transition: 0.3s;}
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);}
        
        button { width: 100%; padding: 18px; background: var(--primary); color: #0f172a; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px;}
        button:hover { background: #7dd3fc; transform: translateY(-2px);}
        
        .error { color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 14px;}
        .back-link { display: inline-block; margin-top: 20px; color: var(--text-muted); text-decoration: none; font-size: 14px;}
        .back-link:hover { color: var(--primary);}
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Medicare+</h1>
        <p>Admin Portal Login</p>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/login">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Login Securely</button>
        </form>
        <a href="/" class="back-link">← Return to Search</a>
    </div>
</body>
</html>
